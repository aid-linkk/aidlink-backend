# ---------------------------------------------------------------------------
# WEBHOOK PAYLOADS
# ---------------------------------------------------------------------------
# AidLink emits webhook events to registered URLs.
# All requests include:
#   X-Signature: sha256=<HMAC-SHA256 of request body using your webhook secret>
#   X-Webhook-Id: <unique delivery ID>
#   Content-Type: application/json
#
# HMAC verification example (Node.js):
#   const sig = crypto.createHmac('sha256', WEBHOOK_SECRET)
#                     .update(rawBody)
#                     .digest('hex');
#   if (`sha256=${sig}` !== req.headers['x-signature']) throw new Error('Invalid signature');
#
# x-webhooks is a vendor extension; events are not REST endpoints.
# ---------------------------------------------------------------------------
x-webhooks:
  donation.created:
    post:
      summary: Donation created
      description: |
        Fired when a new donation record is created (status = PENDING).
        Includes a `matchedFunds` estimate for display purposes; final match
        is computed after confirmation.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                event:
                  type: string
                  example: donation.created
                timestamp:
                  type: string
                  format: date-time
                  example: "2024-03-15T10:30:00Z"
                data:
                  $ref: '#/components/schemas/Donation'
            example:
              event: donation.created
              timestamp: "2024-03-15T10:30:00Z"
              data:
                id: clxdon001
                campaignId: clxcamp001
                amount: "250.00"
                currency: XLM
                status: PENDING
                matchedFunds: "75.00"
                isAnonymous: false
                donorMessage: Wishing the families well!
                createdAt: "2024-03-15T10:30:00Z"

  donation.confirmed:
    post:
      summary: Donation confirmed on-chain
      description: Fired when a donation is confirmed on the Stellar blockchain.
      requestBody:
        content:
          application/json:
            example:
              event: donation.confirmed
              timestamp: "2024-03-15T10:35:00Z"
              data:
                id: clxdon001
                campaignId: clxcamp001
                amount: "250.00"
                status: CONFIRMED
                blockchainTxHash: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
                matchedFunds: "75.00"

  campaign.suspended:
    post:
      summary: Campaign suspended
      description: Fired when a campaign is suspended (auto or admin).
      requestBody:
        content:
          application/json:
            example:
              event: campaign.suspended
              timestamp: "2024-03-15T12:00:00Z"
              data:
                campaignId: clxcamp001
                suspensionId: clxsusp001
                reasonCode: FRAUD_REPORTS
                source: AUTO

  campaign.reinstated:
    post:
      summary: Campaign reinstated
      requestBody:
        content:
          application/json:
            example:
              event: campaign.reinstated
              timestamp: "2024-03-18T09:00:00Z"
              data:
                campaignId: clxcamp001
                liftedAt: "2024-03-18T09:00:00Z"

  distribution.completed:
    post:
      summary: Distribution completed
      description: Fired when a distribution is confirmed on-chain.
      requestBody:
        content:
          application/json:
            example:
              event: distribution.completed
              timestamp: "2024-03-20T14:00:00Z"
              data:
                id: clxdist001
                campaignId: clxcamp001
                beneficiaryId: clxben001
                amount: "500.00"
                currency: XLM
                status: COMPLETED
                blockchainTxHash: b4e9d3f2a5c678901bcdef2345678901bcdef2345678901bcdef2345678901bc

  kyc.reviewed:
    post:
      summary: KYC submission reviewed
      requestBody:
        content:
          application/json:
            example:
              event: kyc.reviewed
              timestamp: "2024-03-16T11:00:00Z"
              data:
                submissionId: clxkyc001
                beneficiaryId: clxben001
                status: APPROVED
                reviewNotes: Document is clear

# ---------------------------------------------------------------------------
# WEBSOCKET EVENTS
# ---------------------------------------------------------------------------
# WebSocket connection: ws(s)://<host>/socket.io/
# Authentication: pass JWT in handshake:
#   const socket = io(HOST, { auth: { token: accessToken } })
#
# Client → Server events (emit):
#   join_campaign    { campaignId }   — subscribe to campaign room
#   leave_campaign   { campaignId }
#   join_organization  { organizationId }
#   leave_organization { organizationId }
#   join_beneficiary   { beneficiaryId }
#   leave_beneficiary  { beneficiaryId }
#
# Server → Client events (listen):
# ---------------------------------------------------------------------------
x-websocket-events:
  connected:
    description: Emitted immediately after a successful authenticated connection.
    payload:
      example:
        message: Successfully connected to AidLink real-time updates
        userId: clx1a2b3c4d5e6f7g8h9

  donation:created:
    description: |
      Emitted to campaign room and donor's personal room when a new donation is
      created (PENDING). Used to show live donation feeds on campaign pages.
    payload:
      example:
        id: clxdon001
        campaignId: clxcamp001
        amount: "250.00"
        currency: XLM
        status: PENDING
        matchedFunds: "75.00"
        isAnonymous: false
        donorMessage: Wishing the families well!
        createdAt: "2024-03-15T10:30:00Z"
        campaign:
          id: clxcamp001
          title: Clean Water for Northern Kenya
        user:
          id: clx1a2b3c4d5e6f7g8h9
          username: john_donor

  campaign:updated:
    description: Emitted to campaign room whenever campaign data changes (new donation, status change, etc.).
    payload:
      example:
        id: clxcamp001
        title: Clean Water for Northern Kenya
        currentAmount: "12750.00"
        status: ACTIVE
        _count:
          donations: 48
          beneficiaries: 12
          distributions: 8

  distribution:updated:
    description: Emitted to campaign room and beneficiary room when a distribution is updated.
    payload:
      example:
        id: clxdist001
        campaignId: clxcamp001
        beneficiaryId: clxben001
        amount: "500.00"
        status: COMPLETED
        blockchainTxHash: b4e9d3f2a5c678901bcdef2345678901bcdef2345678901bcdef2345678901bc

  notification:new:
    description: Emitted to the user's personal room for any new in-app notification.
    payload:
      example:
        id: clxnotif001
        type: DONATION_RECEIVED
        title: Donation Received
        message: Your campaign received a donation of 250 XLM
        status: UNREAD
        createdAt: "2024-03-15T10:30:00Z"

  campaign:suspended:
    description: Emitted to campaign room and owner's personal room when a campaign is suspended.
    payload:
      example:
        campaignId: clxcamp001
        suspensionId: clxsusp001
        reasonCode: FRAUD_REPORTS
        source: AUTO

  campaign:reinstated:
    description: Emitted to campaign room and owner's personal room when a suspension is lifted.
    payload:
      example:
        campaignId: clxcamp001
        liftedAt: "2024-03-18T09:00:00Z"

  appeal:updated:
    description: Emitted to the campaign owner's personal room when an appeal status changes.
    payload:
      example:
        appealId: clxapp001
        campaignId: clxcamp001
        status: APPROVED
        adminNotes: Documents verified — campaign reinstated

# ---------------------------------------------------------------------------
# BLOCKCHAIN TRANSACTION FORMATS
# ---------------------------------------------------------------------------
# AidLink uses Stellar (Soroban) for on-chain donations and distributions.
# Transactions are constructed client-side, signed with the donor/org wallet,
# and submitted to Stellar. The resulting tx hash is then sent to the API
# for confirmation (POST /donations/:id/confirm or /distributions/:id/confirm).
# ---------------------------------------------------------------------------
x-blockchain-formats:
  stellar-donation-tx:
    description: |
      A signed Stellar payment transaction representing a donation.
      The client constructs and signs this, then submits to Stellar Horizon.
      After successful submission, send the `txHash` to `/donations/:id/confirm`.
    example:
      txEnvelopeXdr: AAAAAgAAAABLqBdSHJ5KMKaIJtHgLBqo1H6MXLPK0X8F3KNZcgHEQAAAAA...
      txHash: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
      network: TESTNET
      operations:
        - type: payment
          destination: GCEZWKCA5VLDNRLN3RPRJMRZOX3Z6G5CHCGKZM9OSGLPQOAKXQ5XRGT
          asset: XLM
          amount: "250.0000000"
      memo:
        type: text
        value: aidlink:donate:clxcamp001
      fee: 100
      sequence: "50234891"

  stellar-distribution-tx:
    description: |
      A signed Stellar payment transaction representing a fund distribution
      to a beneficiary. Constructed by the organization, signed, submitted
      to Stellar, then confirmed via `/distributions/:id/confirm`.
    example:
      txEnvelopeXdr: AAAAAgAAAABK8m3ZX1TKsYUdV2lJfF8FBlo5JHxZmGw9Kq0...
      txHash: b4e9d3f2a5c678901bcdef2345678901bcdef2345678901bcdef2345678901bc
      network: MAINNET
      operations:
        - type: payment
          destination: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
          asset: XLM
          amount: "500.0000000"
      memo:
        type: text
        value: aidlink:dist:clxdist001

  soroban-contract-call:
    description: |
      A Soroban smart contract invocation (e.g., campaign registration or
      quadratic funding calculation). The result is indexed by the Soroban
      indexer and stored as a `BlockchainTransaction` record.
    example:
      txEnvelopeXdr: AAAAAgAAAACPFx8K2HxzYMzW3DpLkq7R...
      txHash: c5f0e4g3b6d789012cdefg3456789012cdefg3456789012cdefg3456789012cd
      network: MAINNET
      contractAddress: CDLZFC3SYJYDZT7K67VZ75HPJVIEUVNIXF47ZG2FB2RMQQVU2HHGCYSC
      functionName: register_campaign
      args:
        - type: Bytes
          value: clxcamp001
        - type: i128
          value: "50000000000"
      simulated: false
