                  blockchainTxHash: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
                  matchedFunds: "75.00"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/donations/{id}/confirm:
    post:
      tags: [Donations]
      summary: Confirm donation with blockchain transaction
      description: |
        Links a pending donation to a confirmed Stellar transaction hash. The server
        verifies the tx on-chain before marking the donation `CONFIRMED`.
        **Auth:** Bearer JWT — donation owner.
      operationId: confirmDonation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [txHash]
              properties:
                txHash:
                  type: string
                  description: Stellar transaction hash (64-char hex)
                  example: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
            example:
              txHash: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
      responses:
        "200":
          description: Donation confirmed on-chain
          content:
            application/json:
              example:
                success: true
                message: Donation confirmed on blockchain
                data:
                  id: clxdon001
                  status: CONFIRMED
                  blockchainTxHash: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
                  matchedFunds: "75.00"
        "400":
          description: Transaction hash invalid or already used
          content:
            application/json:
              example:
                success: false
                error:
                  code: BAD_REQUEST
                  message: Transaction hash already associated with another donation
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/donations/{id}/refund:
    post:
      tags: [Donations]
      summary: Refund a donation
      description: |
        Initiates a refund for a confirmed donation. Only ADMIN or the donor (for their own
        donation) may request a refund.
        **Auth:** Bearer JWT — role: ADMIN or donation owner.
      operationId: refundDonation
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Refund initiated
          content:
            application/json:
              example:
                success: true
                message: Refund initiated
                data:
                  id: clxdon001
                  status: REFUNDED
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Donation is not in a refundable state
          content:
            application/json:
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Only CONFIRMED donations can be refunded

  # ==========================================================================
  # BENEFICIARIES
  # ==========================================================================

  /api/v1/beneficiaries:
    post:
      tags: [Beneficiaries]
      summary: Create a beneficiary profile
      description: |
        Registers a new beneficiary. The profile starts in `PENDING` status until verified.
        **Auth:** Bearer JWT — role: BENEFICIARY.
      operationId: createBeneficiary
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstName
                - lastName
                - dateOfBirth
                - gender
                - nationality
                - idDocumentType
                - idDocumentNumber
                - phoneNumber
                - address
                - city
                - country
                - familySize
              properties:
                firstName:
                  type: string
                  example: Amina
                lastName:
                  type: string
                  example: Hassan
                dateOfBirth:
                  type: string
                  format: date-time
                  example: "1988-06-15T00:00:00Z"
                gender:
                  type: string
                  example: FEMALE
                nationality:
                  type: string
                  example: Kenyan
                idDocumentType:
                  type: string
                  example: NATIONAL_ID
                idDocumentNumber:
                  type: string
                  example: "12345678"
                phoneNumber:
                  type: string
                  example: "+254712345678"
                address:
                  type: string
                  example: 12 Kibera Drive
                city:
                  type: string
                  example: Nairobi
                country:
                  type: string
                  example: Kenya
                coordinates:
                  type: string
                  description: JSON string e.g. {"lat":-1.2921,"lng":36.8219}
                familySize:
                  type: integer
                  minimum: 1
                  example: 4
                needsAssessment:
                  type: string
                  example: Clean water, food, healthcare
            example:
              firstName: Amina
              lastName: Hassan
              dateOfBirth: "1988-06-15T00:00:00Z"
              gender: FEMALE
              nationality: Kenyan
              idDocumentType: NATIONAL_ID
              idDocumentNumber: "12345678"
              phoneNumber: "+254712345678"
              address: 12 Kibera Drive
              city: Nairobi
              country: Kenya
              familySize: 4
              needsAssessment: Clean water, food, healthcare
      responses:
        "201":
          description: Beneficiary profile created
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxben001
                  firstName: Amina
                  lastName: Hassan
                  status: PENDING
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: Beneficiary profile already exists for this user
          content:
            application/json:
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Beneficiary profile already exists

    get:
      tags: [Beneficiaries]
      summary: List beneficiaries
      description: |
        Returns a paginated list of beneficiaries.
        **Auth:** Bearer JWT — role: ADMIN or VERIFIER.
      operationId: getBeneficiaries
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/BeneficiaryStatus'
        - name: country
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Beneficiaries retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  beneficiaries:
                    - id: clxben001
                      firstName: Amina
                      lastName: Hassan
                      status: PENDING
                      country: Kenya
                      city: Nairobi
                  meta:
                    page: 1
                    limit: 20
                    total: 84
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

