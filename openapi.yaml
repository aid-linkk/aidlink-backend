openapi: 3.0.3
info:
  title: AidLink Backend API
  version: 1.0.0
  description: |
    Production-grade REST API for AidLink — a blockchain-powered humanitarian aid platform built on Soroban/Stellar.

    ## Authentication
    All protected endpoints require a Bearer JWT in the `Authorization` header:
    ```
    Authorization: Bearer <access_token>
    ```
    Tokens are obtained via `POST /api/v1/auth/login` or `POST /api/v1/auth/wallet`.
    Access tokens expire in 15 minutes; use `POST /api/v1/auth/refresh` with the refresh token.

    ## Rate Limits
    Rate limit headers are returned on every response (`RateLimit-Limit`, `RateLimit-Remaining`, `RateLimit-Reset`).
    | Scope | Limit |
    |---|---|
    | Global API | 100 req / 15 min per IP |
    | Auth endpoints | 5 req / 15 min per IP |
    | Donation creation | 10 req / min per user |
    | Campaign creation | 3 req / hour per user |
    | Distribution creation | 5 req / min per user |
    | Search | 30 req / min per user |
    | Analytics | 20 req / min per user |
    | Notifications | 10 req / min per user |
    | Fraud reports | 5 req / hour per user |

    ## Roles
    | Role | Description |
    |---|---|
    | ADMIN | Full platform access |
    | ORGANIZATION | Manages campaigns and distributions |
    | DONOR | Creates donations |
    | BENEFICIARY | Receives distributions, submits KYC |
    | VERIFIER | Reviews KYC and beneficiary data |
    | AUDITOR | Read-only audit access |

    ## Errors
    All errors follow a consistent envelope:
    ```json
    { "success": false, "error": "Human-readable message", "details": [...] }
    ```

  contact:
    name: AidLink Team
    email: dev@aidlink.org
  license:
    name: MIT

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api-staging.aidlink.org
    description: Staging
  - url: https://api.aidlink.org
    description: Production

tags:
  - name: Authentication
    description: Register, login, wallet auth, token refresh, session management
  - name: Campaigns
    description: Campaign lifecycle — create, update, fund-track, milestone and beneficiary assignment
  - name: Donations
    description: Donor contributions and blockchain confirmation
  - name: Beneficiaries
    description: Beneficiary profiles, KYC submissions and review
  - name: Distributions
    description: Fund disbursement to beneficiaries with proof tracking
  - name: Notifications
    description: In-app and push notification management
  - name: Admin
    description: Platform administration — users, audit logs, moderation, system health
  - name: Organizations
    description: NGO/organization profiles, bank accounts and verification workflow
  - name: Analytics
    description: Campaign, donor, organization and platform-wide metrics
  - name: Search
    description: Full-text and filtered search across entities
  - name: Upload
    description: File upload — profile pictures, KYC documents, campaign images, distribution proofs
  - name: Moderation
    description: Fraud reports, campaign suspensions and appeals

# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token obtained from /auth/login or /auth/wallet

  schemas:
    # ── Generic wrappers ────────────────────────────────────────────────────
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully
        data:
          type: object

    PaginatedMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        total:
          type: integer
          example: 142
        pages:
          type: integer
          example: 8

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - VALIDATION_ERROR
                - UNAUTHORIZED
                - FORBIDDEN
                - EMAIL_NOT_VERIFIED
                - VERIFICATION_FAILED
                - NOT_FOUND
                - GONE
                - CONFLICT
                - BAD_REQUEST
                - PAYLOAD_TOO_LARGE
                - UNSUPPORTED_MEDIA_TYPE
                - RATE_LIMITED
                - INTERNAL_SERVER_ERROR
              example: VALIDATION_ERROR
            message:
              type: string
              example: Validation failed
            details:
              type: object
              additionalProperties:
                type: string
              example:
                amount: Amount must be positive

    # ── Enums ──────────────────────────────────────────────────────────────
    Role:
      type: string
      enum: [ADMIN, ORGANIZATION, DONOR, BENEFICIARY, VERIFIER, AUDITOR]

    UserStatus:
      type: string
      enum: [ACTIVE, SUSPENDED, PENDING_VERIFICATION, REJECTED, DELETED]

    CampaignStatus:
      type: string
      enum: [DRAFT, ACTIVE, PAUSED, COMPLETED, CANCELLED, SUSPENDED, PENDING_REVIEW]

    DonationStatus:
      type: string
      enum: [PENDING, CONFIRMED, FAILED, REFUNDED]

    BeneficiaryStatus:
      type: string
      enum: [PENDING, VERIFIED, REJECTED, SUSPENDED, ACTIVE]

    DistributionStatus:
      type: string
      enum: [PENDING, IN_PROGRESS, COMPLETED, FAILED, CANCELLED]

    DistributionMethod:
      type: string
      enum: [CASH, BANK_TRANSFER, MOBILE_MONEY, CRYPTO, VOUCHER, IN_KIND]

    KYCStatus:
      type: string
      enum: [PENDING, UNDER_REVIEW, APPROVED, REJECTED, EXPIRED]

    NotificationType:
      type: string
      enum:
        - DONATION_RECEIVED
        - CAMPAIGN_UPDATE
        - DISTRIBUTION_SENT
        - KYC_APPROVED
        - KYC_REJECTED
        - SYSTEM_ALERT
        - SECURITY_ALERT
        - CAMPAIGN_SUSPENDED
        - CAMPAIGN_REINSTATED
        - APPEAL_UPDATE

    AppealStatus:
      type: string
      enum: [OPEN, UNDER_REVIEW, APPROVED, DENIED]

    FraudReportType:
      type: string
      enum: [SCAM, MISINFORMATION, INAPPROPRIATE_CONTENT, IMPERSONATION, DUPLICATE, OTHER]

    OrganizationStatus:
      type: string
      enum: [PENDING, APPROVED, SUSPENDED, REJECTED]

    OrganizationVerificationStatus:
      type: string
      enum: [UNVERIFIED, PENDING_VERIFICATION, VERIFIED, REJECTED, SUSPENDED, MORE_INFO_REQUESTED]

    # ── Core models ────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          example: clx1a2b3c4d5e6f7g8h9
        email:
          type: string
          format: email
          example: donor@example.com
        username:
          type: string
          example: john_donor
        walletAddress:
          type: string
          example: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
        role:
          $ref: '#/components/schemas/Role'
        status:
          $ref: '#/components/schemas/UserStatus'
        emailVerified:
          type: boolean
        lastLogin:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Session:
      type: object
      properties:
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: integer
          description: Seconds until access token expires
          example: 900
        user:
          $ref: '#/components/schemas/User'

    Organization:
      type: object
      properties:
        id:
          type: string
          example: clx2org0001
        userId:
          type: string
        name:
          type: string
          example: Hope Foundation
        email:
          type: string
          format: email
        country:
          type: string
          example: Kenya
        description:
          type: string
        website:
          type: string
          format: uri
        logo:
          type: string
          format: uri
        registrationNumber:
          type: string
        taxId:
          type: string
        status:
          $ref: '#/components/schemas/OrganizationStatus'
        verificationStatus:
          $ref: '#/components/schemas/OrganizationVerificationStatus'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    BankAccount:
      type: object
      properties:
        id:
          type: string
          example: clxbank001
        organizationId:
          type: string
        bankName:
          type: string
          example: Equity Bank Kenya
        accountHolderName:
          type: string
          example: Hope Foundation
        accountNumber:
          type: string
          example: "1234567890"
        routingNumber:
          type: string
        iban:
          type: string
        accountType:
          type: string
          example: CHECKING
        currency:
          type: string
          example: USD
        country:
          type: string
        verificationStatus:
          type: string
          enum: [UNVERIFIED, PENDING_VERIFICATION, VERIFIED, REJECTED, ARCHIVED]
        isPrimary:
          type: boolean
        createdAt:
          type: string
          format: date-time

    Campaign:
      type: object
      properties:
        id:
          type: string
          example: clxcamp001
        organizationId:
          type: string
        userId:
          type: string
        title:
          type: string
          example: Clean Water for Northern Kenya
        description:
          type: string
        imageUrl:
          type: string
          format: uri
        targetAmount:
          type: string
          description: Decimal string to preserve precision
          example: "50000.00"
        currentAmount:
          type: string
          example: "12500.00"
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/CampaignStatus'
        blockchainTxHash:
          type: string
        contractAddress:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CampaignStats:
      type: object
      properties:
        campaignId:
          type: string
          example: clxcamp001
        totalDonated:
          type: string
          example: "12500.00"
          description: Sum of all confirmed donations
        totalMatched:
          type: string
          example: "3750.00"
          description: Quadratic matching funds added
        combinedRaised:
          type: string
          example: "16250.00"
          description: totalDonated + totalMatched
        donationCount:
          type: integer
          example: 47
        beneficiaryCount:
          type: integer
          example: 12
        distributionCount:
          type: integer
          example: 8
        percentFunded:
          type: number
          format: float
          example: 32.5

    Milestone:
      type: object
      properties:
        id:
          type: string
        campaignId:
          type: string
        title:
          type: string
          example: Drill first borehole
        description:
          type: string
        targetAmount:
          type: string
          example: "10000.00"
        achieved:
          type: boolean
        achievedAt:
          type: string
          format: date-time
        order:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time

    Donation:
      type: object
      properties:
        id:
          type: string
          example: clxdon001
        campaignId:
          type: string
        userId:
          type: string
        amount:
          type: string
          example: "250.00"
        currency:
          type: string
          example: XLM
        status:
          $ref: '#/components/schemas/DonationStatus'
        blockchainTxHash:
          type: string
          example: a3f8c2d1e4b5...
        fromWallet:
          type: string
        toWallet:
          type: string
        memo:
          type: string
        isAnonymous:
          type: boolean
        donorMessage:
          type: string
        matchedFunds:
          type: string
          description: Quadratic match amount added to this donation
          example: "75.00"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Beneficiary:
      type: object
      properties:
        id:
          type: string
          example: clxben001
        userId:
          type: string
        firstName:
          type: string
          example: Amina
        lastName:
          type: string
          example: Hassan
        dateOfBirth:
          type: string
          format: date-time
        gender:
          type: string
          example: FEMALE
        nationality:
          type: string
          example: Kenyan
        idDocumentType:
          type: string
          example: NATIONAL_ID
        idDocumentNumber:
          type: string
        phoneNumber:
          type: string
        address:
          type: string
        city:
          type: string
          example: Nairobi
        country:
          type: string
          example: Kenya
        familySize:
          type: integer
          example: 4
        status:
          $ref: '#/components/schemas/BeneficiaryStatus'
        riskScore:
          type: integer
          example: 15
        createdAt:
          type: string
          format: date-time

    KYCSubmission:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        beneficiaryId:
          type: string
        submissionType:
          type: string
          example: INDIVIDUAL
        status:
          $ref: '#/components/schemas/KYCStatus'
        documentType:
          type: string
          example: NATIONAL_ID
        documentUrl:
          type: string
          format: uri
        selfieUrl:
          type: string
          format: uri
        reviewNotes:
          type: string
        reviewedAt:
          type: string
          format: date-time
        fraudScore:
          type: integer
          example: 5
        createdAt:
          type: string
          format: date-time

    Distribution:
      type: object
      properties:
        id:
          type: string
          example: clxdist001
        campaignId:
          type: string
        beneficiaryId:
          type: string
        amount:
          type: string
          example: "500.00"
        currency:
          type: string
          example: XLM
        method:
          $ref: '#/components/schemas/DistributionMethod'
        status:
          $ref: '#/components/schemas/DistributionStatus'
        blockchainTxHash:
          type: string
        proofDocumentUrl:
          type: string
          format: uri
        notes:
          type: string
        distributedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        type:
          $ref: '#/components/schemas/NotificationType'
        title:
          type: string
          example: Donation Received
        message:
          type: string
          example: Your campaign received a donation of 250 XLM
        status:
          type: string
          enum: [UNREAD, READ, ARCHIVED]
        metadata:
          type: object
        readAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    Suspension:
      type: object
      properties:
        id:
          type: string
        campaignId:
          type: string
        source:
          type: string
          enum: [AUTO, ADMIN]
        reasonCode:
          type: string
          enum: [LOW_VERIFICATION, FRAUD_REPORTS, POLICY_VIOLATION, MANUAL_REVIEW, OTHER]
        reasonText:
          type: string
        active:
          type: boolean
        liftedAt:
          type: string
          format: date-time
        liftNotes:
          type: string
        createdAt:
          type: string
          format: date-time

    Appeal:
      type: object
      properties:
        id:
          type: string
        suspensionId:
          type: string
        campaignId:
          type: string
        message:
          type: string
        attachments:
          type: array
          items:
            type: string
            format: uri
        status:
          $ref: '#/components/schemas/AppealStatus'
        adminNotes:
          type: string
        resolvedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    AuditLog:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        action:
          type: string
          example: DONATION_MADE
        entityType:
          type: string
          example: Donation
        entityId:
          type: string
        changes:
          type: object
        ipAddress:
          type: string
        createdAt:
          type: string
          format: date-time

    BlockchainTransaction:
      type: object
      properties:
        id:
          type: string
        txHash:
          type: string
          example: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef1234567890
        type:
          type: string
          enum: [DONATION, DISTRIBUTION, CONTRACT_DEPLOYMENT, CONTRACT_CALL, FEE_PAYMENT]
        fromAddress:
          type: string
          example: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
        toAddress:
          type: string
          example: GCEZWKCA5VLDNRLN3RPRJMRZOX3Z6G5CHCGKZM9OSGLPQOAKXQ5XRGT
        amount:
          type: string
          example: "250.00"
        currency:
          type: string
          example: XLM
        contractAddress:
          type: string
        functionName:
          type: string
          example: donate
        parameters:
          type: object
        status:
          type: string
          enum: [PENDING, CONFIRMED, FAILED]
        blockNumber:
          type: string
          description: Stellar ledger sequence number
          example: "50234891"
        timestamp:
          type: string
          format: date-time
        indexed:
          type: boolean

  # ── Reusable parameters ──────────────────────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      description: Page number (1-based)
      schema:
        type: integer
        default: 1
        minimum: 1

    LimitParam:
      name: limit
      in: query
      description: Results per page
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

    SortParam:
      name: sort
      in: query
      description: "Sort field, prefix with - for descending (e.g. -createdAt)"
      schema:
        type: string

  # ── Reusable responses ───────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: UNAUTHORIZED
              message: Authentication token required

    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: FORBIDDEN
              message: Insufficient permissions

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: NOT_FOUND
              message: Resource not found

    ValidationError:
      description: Request body failed schema validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: VALIDATION_ERROR
              message: Validation failed
              details:
                amount: Amount must be positive

    RateLimited:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: RATE_LIMITED
              message: Too many requests, please try again later

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            error:
              code: INTERNAL_SERVER_ERROR
              message: Internal server error

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # ==========================================================================
  # AUTH
  # ==========================================================================

  /api/v1/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      description: |
        Creates a new user account. The account starts in `PENDING_VERIFICATION` status.
        **Rate limit:** 5 requests / 15 min per IP.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: donor@example.com
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecurePass123!"
                username:
                  type: string
                  example: john_donor
                role:
                  $ref: '#/components/schemas/Role'
            example:
              email: donor@example.com
              password: "SecurePass123!"
              username: john_donor
              role: DONOR
      responses:
        "201":
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: User registered successfully
                data:
                  id: clx1a2b3c4d5e6f7g8h9
                  email: donor@example.com
                  username: john_donor
                  role: DONOR
                  status: PENDING_VERIFICATION
                  createdAt: "2024-03-15T10:30:00Z"
        "400":
          $ref: '#/components/responses/ValidationError'
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Email already in use
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/login:
    post:
      tags: [Authentication]
      summary: Login with email and password
      description: |
        Authenticates a user and returns JWT access + refresh tokens.
        **Rate limit:** 5 requests / 15 min per IP.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
            example:
              email: donor@example.com
              password: "SecurePass123!"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Login successful
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VySWQiOiJjbHgxYTJiM2M0ZDVlNmY3ZzhoOSIsInJvbGUiOiJET05PUiIsImlhdCI6MTcxMDQ5NjIwMCwiZXhwIjoxNzEwNDk3MTAwfQ.sig
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.sig
                  expiresIn: 900
                  user:
                    id: clx1a2b3c4d5e6f7g8h9
                    email: donor@example.com
                    role: DONOR
                    status: ACTIVE
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: Invalid email or password
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/wallet:
    post:
      tags: [Authentication]
      summary: Authenticate with a Stellar wallet
      description: |
        Verifies a signed message from a Stellar wallet address and returns JWT tokens.
        The client must sign the `message` string with the wallet private key and pass the hex signature.
        **Rate limit:** 5 requests / 15 min per IP.
      operationId: walletAuth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [walletAddress, signature, message]
              properties:
                walletAddress:
                  type: string
                  example: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
                signature:
                  type: string
                  description: Ed25519 signature of `message` in hex
                  example: a3f8c2d1e4b567890abcdef...
                message:
                  type: string
                  description: Nonce/challenge string that was signed
                  example: "AidLink authentication nonce: 1710496200"
            example:
              walletAddress: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
              signature: a3f8c2d1e4b567890abcdef1234567890abcdef1234567890abcdef12345678
              message: "AidLink authentication nonce: 1710496200"
      responses:
        "200":
          description: Wallet authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Wallet authentication successful
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.wallet.sig
                  refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.sig
                  expiresIn: 900
        "401":
          description: Signature verification failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: Invalid wallet signature
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: Exchange a valid refresh token for a new access token.
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
            example:
              refreshToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.refresh.sig
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                data:
                  accessToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.new.sig
                  expiresIn: 900
        "401":
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                success: false
                error:
                  code: UNAUTHORIZED
                  message: Refresh token expired

  /api/v1/auth/logout:
    post:
      tags: [Authentication]
      summary: Logout current session
      description: Invalidates the current session token. Requires Bearer auth.
      operationId: logout
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              example:
                success: true
                message: Logged out successfully
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout-all:
    post:
      tags: [Authentication]
      summary: Logout from all sessions
      description: Invalidates all active sessions for the authenticated user.
      operationId: logoutAll
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All sessions invalidated
          content:
            application/json:
              example:
                success: true
                message: Logged out from all devices
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/me:
    get:
      tags: [Authentication]
      summary: Get current authenticated user
      description: Returns the profile of the user identified by the Bearer token.
      operationId: getMe
      security:
        - bearerAuth: []
      responses:
        "200":
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                data:
                  id: clx1a2b3c4d5e6f7g8h9
                  email: donor@example.com
                  username: john_donor
                  role: DONOR
                  status: ACTIVE
                  emailVerified: true
                  lastLogin: "2024-03-15T10:30:00Z"
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # CAMPAIGNS
  # ==========================================================================

  /api/v1/campaigns:
    post:
      tags: [Campaigns]
      summary: Create a new campaign
      description: |
        Creates a humanitarian aid campaign. The campaign starts in `DRAFT` status.
        **Auth:** Bearer JWT — role: ORGANIZATION or ADMIN.
        **Rate limit:** 3 req / hour per user.
      operationId: createCampaign
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description, targetAmount, startDate, organizationId]
              properties:
                title:
                  type: string
                  minLength: 5
                  maxLength: 200
                  example: Clean Water for Northern Kenya
                description:
                  type: string
                  minLength: 20
                  example: Drilling boreholes to provide safe drinking water to 5,000 families
                imageUrl:
                  type: string
                  format: uri
                targetAmount:
                  type: number
                  format: float
                  minimum: 1
                  example: 50000
                startDate:
                  type: string
                  format: date-time
                  example: "2024-04-01T00:00:00Z"
                endDate:
                  type: string
                  format: date-time
                  example: "2024-07-01T00:00:00Z"
                organizationId:
                  type: string
                  example: clx2org0001
            example:
              title: Clean Water for Northern Kenya
              description: Drilling boreholes to provide safe drinking water to 5,000 families in Turkana County
              targetAmount: 50000
              startDate: "2024-04-01T00:00:00Z"
              endDate: "2024-07-01T00:00:00Z"
              organizationId: clx2org0001
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                message: Campaign created successfully
                data:
                  id: clxcamp001
                  title: Clean Water for Northern Kenya
                  status: DRAFT
                  targetAmount: "50000.00"
                  currentAmount: "0.00"
                  organizationId: clx2org0001
                  createdAt: "2024-03-15T10:30:00Z"
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "429":
          $ref: '#/components/responses/RateLimited'

    get:
      tags: [Campaigns]
      summary: List campaigns
      description: |
        Returns a paginated list of campaigns. Supports filtering by status, organization, and keyword search.
        **Auth:** Bearer JWT — all roles.
      operationId: getCampaigns
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - name: organizationId
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Keyword search on title and description
          schema:
            type: string
      responses:
        "200":
          description: Campaigns retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  campaigns:
                    - id: clxcamp001
                      title: Clean Water for Northern Kenya
                      status: ACTIVE
                      targetAmount: "50000.00"
                      currentAmount: "12500.00"
                      organizationId: clx2org0001
                  meta:
                    page: 1
                    limit: 20
                    total: 142
                    pages: 8
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/campaigns/{id}:
    get:
      tags: [Campaigns]
      summary: Get campaign by ID
      operationId: getCampaignById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: clxcamp001
      responses:
        "200":
          description: Campaign retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxcamp001
                  title: Clean Water for Northern Kenya
                  description: Drilling boreholes...
                  targetAmount: "50000.00"
                  currentAmount: "12500.00"
                  status: ACTIVE
                  organization:
                    id: clx2org0001
                    name: Hope Foundation
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Campaigns]
      summary: Update campaign
      description: |
        Full update of a campaign. Only the campaign owner or ADMIN may update.
        **Auth:** Bearer JWT — role: ORGANIZATION (owner) or ADMIN.
      operationId: updateCampaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                imageUrl:
                  type: string
                  format: uri
                targetAmount:
                  type: number
                endDate:
                  type: string
                  format: date-time
            example:
              title: Clean Water for Northern Kenya (Updated)
              targetAmount: 60000
      responses:
        "200":
          description: Campaign updated
          content:
            application/json:
              example:
                success: true
                message: Campaign updated successfully
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Campaigns]
      summary: Delete campaign
      description: |
        Soft-deletes a campaign. Only the owner or ADMIN may delete.
        **Auth:** Bearer JWT — role: ORGANIZATION (owner) or ADMIN.
      operationId: deleteCampaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Campaign deleted
          content:
            application/json:
              example:
                success: true
                message: Campaign deleted successfully
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/campaigns/{id}/status:
    patch:
      tags: [Campaigns]
      summary: Update campaign status
      description: |
        Transitions a campaign between statuses. Valid transitions depend on role.
        **Auth:** Bearer JWT — role: ORGANIZATION (owner) or ADMIN.
      operationId: updateCampaignStatus
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: '#/components/schemas/CampaignStatus'
            example:
              status: ACTIVE
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              example:
                success: true
                message: Campaign status updated to ACTIVE
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/campaigns/{id}/stats:
    get:
      tags: [Campaigns]
      summary: Get campaign statistics
      description: |
        Returns funding totals including quadratic matching.
        **Auth:** Bearer JWT — all roles.
      operationId: getCampaignStats
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          example: clxcamp001
      responses:
        "200":
          description: Statistics retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
              example:
                success: true
                data:
                  campaignId: clxcamp001
                  totalDonated: "12500.00"
                  totalMatched: "3750.00"
                  combinedRaised: "16250.00"
                  donationCount: 47
                  beneficiaryCount: 12
                  distributionCount: 8
                  percentFunded: 32.5
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/campaigns/{campaignId}/milestones:
    post:
      tags: [Campaigns]
      summary: Add milestone to campaign
      description: |
        Appends a fundraising milestone to an existing campaign.
        **Auth:** Bearer JWT — role: ORGANIZATION (owner) or ADMIN.
      operationId: addMilestone
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, targetAmount, order]
              properties:
                title:
                  type: string
                  example: Drill first borehole
                description:
                  type: string
                targetAmount:
                  type: number
                  example: 10000
                order:
                  type: integer
                  example: 1
            example:
              title: Drill first borehole
              description: Equipment procurement and site preparation
              targetAmount: 10000
              order: 1
      responses:
        "201":
          description: Milestone added
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxmile001
                  title: Drill first borehole
                  targetAmount: "10000.00"
                  achieved: false
                  order: 1
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/campaigns/{campaignId}/beneficiaries:
    post:
      tags: [Campaigns]
      summary: Assign beneficiary to campaign
      description: |
        Links a verified beneficiary to a campaign with an optional pre-allocated amount.
        **Auth:** Bearer JWT — role: ORGANIZATION or ADMIN.
      operationId: assignBeneficiary
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [beneficiaryId]
              properties:
                beneficiaryId:
                  type: string
                  example: clxben001
                assignedAmount:
                  type: number
                  example: 500
                priority:
                  type: integer
                  example: 1
                notes:
                  type: string
            example:
              beneficiaryId: clxben001
              assignedAmount: 500
              priority: 1
              notes: Single mother, 3 children
      responses:
        "201":
          description: Beneficiary assigned
          content:
            application/json:
              example:
                success: true
                data:
                  campaignId: clxcamp001
                  beneficiaryId: clxben001
                  assignedAmount: "500.00"
                  priority: 1
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Beneficiary already assigned to this campaign
          content:
            application/json:
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Beneficiary already assigned to this campaign

  /api/v1/campaigns/{campaignId}/multipliers:
    post:
      tags: [Campaigns]
      summary: Set quadratic funding multipliers for a campaign
      description: |
        Configures matching multiplier rules (e.g., 1.5× for first 100 donors) applied
        during the quadratic funding calculation. Only platform ADMIN or the campaign's
        owning ORGANIZATION may configure multipliers.

        **Auth:** Bearer JWT — role: ORGANIZATION or ADMIN.
        **Rate limit:** 100 req / min per user (global API limit applies).
      operationId: setCampaignMultipliers
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
          example: clxcamp001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [multipliers]
              properties:
                multipliers:
                  type: array
                  items:
                    type: object
                    required: [factor, condition]
                    properties:
                      factor:
                        type: number
                        format: float
                        description: Multiplier factor (e.g. 1.5 = 50% boost)
                        example: 1.5
                      condition:
                        type: object
                        description: Conditions that trigger this multiplier
                        properties:
                          maxDonorRank:
                            type: integer
                            description: Only apply to donors ranked ≤ this value
                            example: 100
                          minDonationAmount:
                            type: number
                            description: Only apply if single donation ≥ this amount
                            example: 10
                      expiresAt:
                        type: string
                        format: date-time
                        description: Optional expiry for this multiplier rule
            example:
              multipliers:
                - factor: 1.5
                  condition:
                    maxDonorRank: 100
                    minDonationAmount: 10
                  expiresAt: "2024-06-01T00:00:00Z"
                - factor: 1.2
                  condition:
                    minDonationAmount: 50
      responses:
        "200":
          description: Multipliers saved
          content:
            application/json:
              example:
                success: true
                message: Multipliers updated for campaign clxcamp001
                data:
                  campaignId: clxcamp001
                  multipliers:
                    - factor: 1.5
                      condition:
                        maxDonorRank: 100
                        minDonationAmount: 10
                      expiresAt: "2024-06-01T00:00:00Z"
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/campaigns/{id}/reports:
    post:
      tags: [Campaigns, Moderation]
      summary: Report a campaign for fraud or policy violation
      description: |
        Submits a fraud/abuse report against a campaign. Accumulating reports may trigger
        automatic suspension (configurable via `MODERATION_FRAUD_REPORT_THRESHOLD`).
        **Auth:** Bearer JWT — all roles.
        **Rate limit:** 5 req / hour per user.
      operationId: reportCampaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  $ref: '#/components/schemas/FraudReportType'
                details:
                  type: string
                  example: This campaign appears to be impersonating a legitimate NGO
            example:
              type: IMPERSONATION
              details: This campaign appears to be impersonating Hope Foundation Kenya
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              example:
                success: true
                message: Report submitted successfully
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/campaigns/{id}/appeals:
    post:
      tags: [Campaigns, Moderation]
      summary: Submit an appeal for a suspended campaign
      description: |
        Campaign owner submits an appeal against a suspension.
        **Auth:** Bearer JWT — campaign owner only.
      operationId: submitAppeal
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                message:
                  type: string
                  example: Our campaign is legitimate. Here is our registration certificate...
                attachments:
                  type: array
                  items:
                    type: string
                    format: uri
            example:
              message: We are a registered NGO. The report was made in error.
              attachments:
                - https://storage.aidlink.org/docs/cert-abc123.pdf
      responses:
        "201":
          description: Appeal submitted
          content:
            application/json:
              example:
                success: true
                message: Appeal submitted successfully
                data:
                  id: clxapp001
                  status: OPEN
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    get:
      tags: [Campaigns, Moderation]
      summary: List appeals for a campaign
      description: |
        Returns all appeals filed against suspensions for this campaign.
        **Auth:** Bearer JWT — campaign owner or ADMIN.
      operationId: getCampaignAppeals
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Appeals retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  - id: clxapp001
                    status: OPEN
                    message: We are a registered NGO...
                    createdAt: "2024-03-15T10:30:00Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ==========================================================================
  # DONATIONS
  # ==========================================================================

  /api/v1/donations:
    post:
      tags: [Donations]
      summary: Create a donation
      description: |
        Initiates a donation to a campaign. The donation starts in `PENDING` status until
        confirmed on-chain via `POST /api/v1/donations/:id/confirm`.
        **Auth:** Bearer JWT — role: DONOR or ADMIN.
        **Rate limit:** 10 req / min per user.
      operationId: createDonation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaignId, amount]
              properties:
                campaignId:
                  type: string
                  example: clxcamp001
                amount:
                  type: number
                  format: float
                  minimum: 0.01
                  example: 250
                currency:
                  type: string
                  default: XLM
                  example: XLM
                fromWallet:
                  type: string
                  example: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
                toWallet:
                  type: string
                  example: GCEZWKCA5VLDNRLN3RPRJMRZOX3Z6G5CHCGKZM9OSGLPQOAKXQ5XRGT
                memo:
                  type: string
                  maxLength: 100
                  example: Donation from John
                isAnonymous:
                  type: boolean
                  default: false
                donorMessage:
                  type: string
                  example: Wishing the families well!
            example:
              campaignId: clxcamp001
              amount: 250
              currency: XLM
              fromWallet: GBKZRTIOAHMXIJKUQPMKLF6JYLXV2PJHFGXZQ4LQXSWM5YIZD3HMGKQ
              toWallet: GCEZWKCA5VLDNRLN3RPRJMRZOX3Z6G5CHCGKZM9OSGLPQOAKXQ5XRGT
              isAnonymous: false
              donorMessage: Wishing the families well!
      responses:
        "201":
          description: Donation created — awaiting blockchain confirmation
          content:
            application/json:
              example:
                success: true
                message: Donation created. Please confirm the blockchain transaction.
                data:
                  id: clxdon001
                  campaignId: clxcamp001
                  amount: "250.00"
                  currency: XLM
                  status: PENDING
                  matchedFunds: "75.00"
                  createdAt: "2024-03-15T10:30:00Z"
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Campaign not found or not ACTIVE
          content:
            application/json:
              example:
                success: false
                error:
                  code: NOT_FOUND
                  message: Campaign not found or not accepting donations
        "429":
          $ref: '#/components/responses/RateLimited'

    get:
      tags: [Donations]
      summary: List all donations
      description: |
        Paginated list of donations. Only ADMIN and ORGANIZATION roles may list all
        donations across users.
        **Auth:** Bearer JWT — role: ADMIN or ORGANIZATION.
      operationId: getDonations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: campaignId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
