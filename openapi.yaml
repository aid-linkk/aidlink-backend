  /api/v1/search/advanced:
    get:
      tags: [Search]
      summary: Advanced search with entity type filtering
      description: |
        Allows filtering by entity type with multiple field criteria.
        **Auth:** Bearer JWT — all roles.
        **Rate limit:** 30 req / min per user.
      operationId: advancedSearch
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: type
          in: query
          description: Entity type to search
          schema:
            type: string
            enum: [campaign, donation, beneficiary, organization]
        - name: filters
          in: query
          description: JSON-encoded filter object
          schema:
            type: string
          example: '{"status":"ACTIVE","country":"Kenya"}'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Advanced search results
          content:
            application/json:
              example:
                success: true
                data:
                  results:
                    - type: campaign
                      id: clxcamp001
                      title: Clean Water for Northern Kenya
                      status: ACTIVE
                  meta:
                    page: 1
                    limit: 20
                    total: 5
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/RateLimited'

  # ==========================================================================
  # UPLOAD
  # ==========================================================================

  /api/v1/upload/profile-picture:
    post:
      tags: [Upload]
      summary: Upload organization profile picture
      description: |
        Accepts a JPEG/PNG/WEBP image (max 5 MB, min 200×200 px). Updates
        `Organization.logo` on success.
        **Auth:** Bearer JWT — organization owner.
      operationId: uploadProfilePicture
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Profile picture uploaded
          content:
            application/json:
              example:
                success: true
                data:
                  url: https://storage.aidlink.org/logos/org001-logo.webp
                  organizationId: clx2org0001
        "400":
          description: No file provided or invalid type
          content:
            application/json:
              example:
                success: false
                error:
                  code: BAD_REQUEST
                  message: No file provided
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        "413":
          description: File exceeds 5 MB limit
          content:
            application/json:
              example:
                success: false
                error:
                  code: PAYLOAD_TOO_LARGE
                  message: File too large — maximum is 5 MB
        "415":
          description: Unsupported file type
          content:
            application/json:
              example:
                success: false
                error:
                  code: UNSUPPORTED_MEDIA_TYPE
                  message: Unsupported file type — use JPEG, PNG or WEBP
        "422":
          description: Image dimensions too small or corrupt
          content:
            application/json:
              example:
                success: false
                error:
                  code: VALIDATION_ERROR
                  message: Image must be at least 200x200 pixels

  /api/v1/upload/kyc/{submissionId}/document:
    post:
      tags: [Upload]
      summary: Upload a KYC identity document or selfie
      description: |
        Stores the file and updates the `KYCSubmission` record.
        Use `?field=selfie` to update `selfieUrl` instead of `documentUrl`.
        **Auth:** Bearer JWT — submission owner.
      operationId: uploadKycDocument
      security:
        - bearerAuth: []
      parameters:
        - name: submissionId
          in: path
          required: true
          schema:
            type: string
        - name: field
          in: query
          description: Which field to update (default = document)
          schema:
            type: string
            enum: [document, selfie]
            default: document
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Document uploaded
          content:
            application/json:
              example:
                success: true
                data:
                  url: https://storage.aidlink.org/kyc/doc-abc123.jpg
                  submissionId: clxkyc001
                  field: document
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: Not the submission owner
          content:
            application/json:
              example:
                success: false
                error:
                  code: FORBIDDEN
                  message: Access denied
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/upload/campaign/{campaignId}/image:
