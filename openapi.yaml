  /api/v1/upload/presigned:
    post:
      tags: [Upload]
      summary: Get a pre-signed URL for direct large-file upload
      description: |
        Returns a time-limited pre-signed URL for uploading directly to cloud storage
        (S3 / Azure Blob). Use this for files > 10 MB to avoid passing through the server.
        **Auth:** Bearer JWT — all roles.
      operationId: getPresignedUploadUrl
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [uploadType, entityId, mimeType]
              properties:
                uploadType:
                  type: string
                  enum: [profile-picture, kyc-document, campaign-image, distribution-proof]
                  example: campaign-image
                entityId:
                  type: string
                  example: clxcamp001
                mimeType:
                  type: string
                  example: image/jpeg
            example:
              uploadType: campaign-image
              entityId: clxcamp001
              mimeType: image/jpeg
      responses:
        "200":
          description: Pre-signed URL returned
          content:
            application/json:
              example:
                success: true
                data:
                  uploadUrl: https://aidlink-storage.s3.amazonaws.com/campaigns/camp001-cover.jpg?X-Amz-Signature=...
                  expiresAt: "2024-03-15T11:00:00Z"
                  maxSizeBytes: 52428800
                  allowedMimeTypes:
                    - image/jpeg
                    - image/png
                    - image/webp
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'

  # ==========================================================================
  # WEBHOOK SUBSCRIPTIONS (Admin management)
  # ==========================================================================

  /api/v1/admin/webhooks:
    post:
      tags: [Admin]
      summary: Register a webhook subscription
      description: |
        Creates a new outbound webhook subscription. AidLink will POST event
        payloads to the registered HTTPS URL and sign them with HMAC-SHA256.
        **Auth:** Bearer JWT — role: ADMIN.
        **Rate limit:** 30 req / min.
      operationId: createWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, url, secret, events]
              properties:
                name:
                  type: string
                  maxLength: 100
                  example: Donation Alerts
                url:
                  type: string
                  format: uri
                  description: Must be HTTPS
                  example: https://partner.example.com/hooks/aidlink
                secret:
                  type: string
                  minLength: 16
                  description: Shared secret used to sign payloads (min 16 chars)
                  example: whsec_super_secret_key_1234567890ab
                events:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum:
                      - DONATION_CONFIRMED
                      - DISTRIBUTION_COMPLETED
                      - CAMPAIGN_MILESTONE_REACHED
                      - KYC_STATUS_CHANGED
                  example: [DONATION_CONFIRMED, DISTRIBUTION_COMPLETED]
                description:
                  type: string
                  maxLength: 500
            example:
              name: Donation Alerts
              url: https://partner.example.com/hooks/aidlink
              secret: whsec_super_secret_key_1234567890ab
              events: [DONATION_CONFIRMED, DISTRIBUTION_COMPLETED]
              description: Notify partner system on donation and distribution completion
      responses:
        "201":
          description: Webhook subscription created
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxwh001
                  name: Donation Alerts
                  url: https://partner.example.com/hooks/aidlink
                  events: [DONATION_CONFIRMED, DISTRIBUTION_COMPLETED]
                  createdAt: "2024-03-15T10:30:00Z"
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

    get:
      tags: [Admin]
      summary: List webhook subscriptions
      description: |
        **Auth:** Bearer JWT — role: ADMIN.
      operationId: listWebhooks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Webhook subscriptions retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  - id: clxwh001
                    name: Donation Alerts
                    url: https://partner.example.com/hooks/aidlink
                    events: [DONATION_CONFIRMED]
                    createdAt: "2024-03-15T10:30:00Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'

  /api/v1/admin/webhooks/events:
    get:
      tags: [Admin]
      summary: Get all webhook delivery events
      description: |
        Returns a log of all outbound webhook delivery attempts across all subscriptions.
