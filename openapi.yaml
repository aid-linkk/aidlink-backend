      summary: Suspend a campaign
      description: |
        Records an immutable suspension event with a reason code.
        The campaign status is set to `SUSPENDED`.
        **Auth:** Bearer JWT — role: ADMIN.
      operationId: suspendCampaign
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reasonCode]
              properties:
                reasonCode:
                  type: string
                  enum: [LOW_VERIFICATION, FRAUD_REPORTS, POLICY_VIOLATION, MANUAL_REVIEW, OTHER]
                reasonText:
                  type: string
                  example: Multiple credible fraud reports received
                evidence:
                  type: object
            example:
              reasonCode: FRAUD_REPORTS
              reasonText: Multiple credible fraud reports received within 24 hours
      responses:
        "200":
          description: Campaign suspended
          content:
            application/json:
              example:
                success: true
                message: Campaign suspended
                data:
                  suspensionId: clxsusp001
                  campaignId: clxcamp001
                  reasonCode: FRAUD_REPORTS
                  active: true
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          description: Campaign already suspended
          content:
            application/json:
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Campaign is already suspended

