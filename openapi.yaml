  /api/v1/beneficiaries/{id}/kyc:
    post:
      tags: [Beneficiaries]
      summary: Submit KYC documents
      description: |
        Submits identity documents for KYC review. The submission starts in `PENDING` status.
        **Auth:** Bearer JWT — role: BENEFICIARY (own profile).
      operationId: submitKYC
      security:
        - bearerAuth: []
      parameters:
