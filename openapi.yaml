  # ==========================================================================
  # ORGANIZATIONS
  # ==========================================================================

  /api/v1/organizations:
    post:
      tags: [Organizations]
      summary: Create an organization
      description: |
        Registers a new NGO/organization profile under the authenticated user.
        **Auth:** Bearer JWT — role: ORGANIZATION.
      operationId: createOrganization
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: Hope Foundation
                email:
                  type: string
                  format: email
                country:
                  type: string
                  example: Kenya
                description:
                  type: string
                website:
                  type: string
                  format: uri
                registrationNumber:
                  type: string
                taxId:
                  type: string
            example:
              name: Hope Foundation
              email: info@hopefoundation.ke
              country: Kenya
              description: Providing clean water and food security across East Africa
              website: https://hopefoundation.ke
              registrationNumber: NGO/2019/001234
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              example:
                success: true
                data:
                  id: clx2org0001
                  name: Hope Foundation
                  status: PENDING
                  verificationStatus: UNVERIFIED
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          description: Organization already exists for this user
          content:
            application/json:
              example:
                success: false
                error:
                  code: CONFLICT
                  message: Organization already registered for this account

    get:
      tags: [Organizations]
      summary: List organizations
      description: |
        Paginated list of organizations.
        **Auth:** Bearer JWT — all roles.
      operationId: getOrganizations
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/OrganizationStatus'
        - name: verificationStatus
          in: query
          schema:
            $ref: '#/components/schemas/OrganizationVerificationStatus'
      responses:
        "200":
          description: Organizations retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  organizations:
                    - id: clx2org0001
                      name: Hope Foundation
                      country: Kenya
                      status: APPROVED
                      verificationStatus: VERIFIED
                  meta:
                    page: 1
                    limit: 20
                    total: 38
        "401":
          $ref: '#/components/responses/Unauthorized'

  /api/v1/organizations/{id}:
    get:
      tags: [Organizations]
      summary: Get organization by ID
      operationId: getOrganizationById
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  id: clx2org0001
                  name: Hope Foundation
                  country: Kenya
                  status: APPROVED
                  verificationStatus: VERIFIED
                  verifiedAt: "2024-01-10T00:00:00Z"
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Organizations]
      summary: Update organization
      description: |
        **Auth:** Bearer JWT — organization owner or ADMIN.
      operationId: updateOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                website:
                  type: string
                  format: uri
                country:
                  type: string
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              example:
                success: true
                message: Organization updated
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Organizations]
      summary: Delete organization
      description: |
        Soft-deletes the organization.
        **Auth:** Bearer JWT — organization owner or ADMIN.
      operationId: deleteOrganization
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization deleted
          content:
            application/json:
              example:
                success: true
                message: Organization deleted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/organizations/{id}/bank-accounts:
    post:
      tags: [Organizations]
      summary: Add a bank account
      description: |
        **Auth:** Bearer JWT — organization owner or ADMIN.
      operationId: addBankAccount
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [bankName, accountNumber, routingNumber, accountType]
              properties:
                bankName:
                  type: string
                  example: Equity Bank Kenya
                accountHolderName:
                  type: string
                  example: Hope Foundation
                accountNumber:
                  type: string
                  example: "1234567890"
                routingNumber:
                  type: string
                  example: "026009593"
                iban:
                  type: string
                accountType:
                  type: string
                  example: CHECKING
                currency:
                  type: string
                  default: USD
                country:
                  type: string
                  example: Kenya
                isPrimary:
                  type: boolean
                  default: false
            example:
              bankName: Equity Bank Kenya
              accountHolderName: Hope Foundation
              accountNumber: "1234567890"
              routingNumber: "026009593"
              accountType: CHECKING
              currency: USD
              country: Kenya
              isPrimary: true
      responses:
        "201":
          description: Bank account added
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxbank001
                  bankName: Equity Bank Kenya
                  verificationStatus: UNVERIFIED
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    get:
      tags: [Organizations]
      summary: List bank accounts
      operationId: listBankAccounts
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bank accounts retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  - id: clxbank001
                    bankName: Equity Bank Kenya
                    accountType: CHECKING
                    verificationStatus: VERIFIED
                    isPrimary: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/organizations/{id}/bank-accounts/{accountId}:
    get:
      tags: [Organizations]
      summary: Get a bank account
      operationId: getBankAccount
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bank account retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxbank001
                  bankName: Equity Bank Kenya
                  accountType: CHECKING
                  verificationStatus: VERIFIED
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Organizations]
      summary: Update a bank account
      operationId: updateBankAccount
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                accountHolderName:
                  type: string
                isPrimary:
                  type: boolean
      responses:
        "200":
          description: Bank account updated
          content:
            application/json:
              example:
                success: true
                message: Bank account updated
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Organizations]
      summary: Delete (archive) a bank account
      operationId: deleteBankAccount
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Bank account archived
          content:
            application/json:
              example:
                success: true
                message: Bank account archived
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/organizations/{id}/bank-accounts/{accountId}/verify:
    post:
      tags: [Organizations]
      summary: Request bank account verification
      description: Triggers the bank account verification workflow.
      operationId: verifyBankAccount
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: accountId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification requested
          content:
            application/json:
              example:
                success: true
                message: Bank account verification requested
                data:
                  verificationStatus: PENDING_VERIFICATION
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  /api/v1/organizations/{id}/verification:
    post:
      tags: [Organizations]
      summary: Submit organization verification documents
      description: |
        Submits legal/registration documents for admin review.
        **Auth:** Bearer JWT — organization owner.
      operationId: submitVerification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [legalDocuments]
              properties:
                legalDocuments:
                  type: object
                  description: Map of document type to storage URL
                  example:
                    registrationCertificate: https://storage.aidlink.org/orgs/cert.pdf
                    taxClearance: https://storage.aidlink.org/orgs/tax.pdf
                representativeContact:
                  type: object
                  properties:
                    name:
                      type: string
                    email:
                      type: string
                    phone:
                      type: string
      responses:
        "200":
          description: Verification submitted
          content:
            application/json:
              example:
                success: true
                message: Verification documents submitted for review
                data:
                  verificationStatus: PENDING_VERIFICATION
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

    get:
      tags: [Organizations]
      summary: Get organization verification status
      operationId: getVerification
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification status retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  verificationStatus: PENDING_VERIFICATION
                  verificationRequestedAt: "2024-03-10T00:00:00Z"
                  verificationNotes: Awaiting document review
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ==========================================================================
  # ANALYTICS
  # ==========================================================================

  /api/v1/analytics/campaign/{campaignId}:
    get:
      tags: [Analytics]
      summary: Get campaign analytics
      description: |
        Returns detailed metrics for a campaign including donation trends, donor counts,
        matching stats, and milestone progress.
        **Auth:** Bearer JWT — campaign owner, ORGANIZATION, or ADMIN.
        **Rate limit:** 20 req / min per user.
      operationId: getCampaignAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
          example: clxcamp001
      responses:
        "200":
          description: Campaign analytics retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  campaignId: clxcamp001
                  totalDonations: 47
                  totalDonated: "12500.00"
                  totalMatched: "3750.00"
                  uniqueDonors: 41
                  averageDonation: "265.96"
                  donationsByDay:
                    - date: "2024-03-15"
                      amount: "1250.00"
                      count: 5
                  milestoneProgress:
                    - id: clxmile001
                      title: Drill first borehole
                      targetAmount: "10000.00"
                      achieved: true
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/analytics/donor:
    get:
      tags: [Analytics]
      summary: Get donor analytics
      description: |
        Returns analytics for the authenticated donor.
        **Auth:** Bearer JWT — role: DONOR or ADMIN.
        **Rate limit:** 20 req / min per user.
      operationId: getDonorAnalytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Donor analytics retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  totalDonated: "1250.00"
                  donationCount: 7
                  campaignsSupported: 4
                  averageDonation: "178.57"
                  donationsByMonth:
                    - month: "2024-03"
                      amount: "500.00"
                      count: 2
        "401":
          $ref: '#/components/responses/Unauthorized'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/analytics/organization/{organizationId}:
    get:
      tags: [Analytics]
      summary: Get organization analytics
      description: |
        Returns aggregated analytics across all campaigns of an organization.
        **Auth:** Bearer JWT — organization owner or ADMIN.
        **Rate limit:** 20 req / min per user.
      operationId: getOrganizationAnalytics
      security:
        - bearerAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Organization analytics retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  organizationId: clx2org0001
                  activeCampaigns: 3
                  totalCampaigns: 8
                  totalRaised: "245000.00"
                  totalDistributed: "198000.00"
                  beneficiariesReached: 142
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/analytics/platform:
    get:
      tags: [Analytics]
      summary: Get platform-wide analytics
      description: |
        **Auth:** Bearer JWT — role: ADMIN or AUDITOR.
        **Rate limit:** 20 req / min per user.
      operationId: getPlatformAnalytics
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Platform analytics retrieved
          content:
            application/json:
              example:
                success: true
                data:
                  totalUsers: 1240
                  totalOrganizations: 38
                  totalCampaigns: 156
                  activeCampaigns: 34
                  totalDonated: "2345000.00"
                  totalDistributed: "1890000.00"
                  beneficiariesReached: 3420
                  blockchainTransactions: 5678
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "429":
          $ref: '#/components/responses/RateLimited'

  /api/v1/analytics/report/{reportType}:
    post:
      tags: [Analytics]
      summary: Generate a report
      description: |
        Generates and returns (or queues) a custom report.
        **Auth:** Bearer JWT — role: ORGANIZATION, ADMIN, or AUDITOR.
        **Rate limit:** 20 req / min per user.
      operationId: generateReport
      security:
        - bearerAuth: []
      parameters:
        - name: reportType
          in: path
          required: true
          schema:
            type: string
            enum: [campaign, donor, organization, platform, audit]
          example: campaign
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                entityId:
                  type: string
                  example: clxcamp001
                fromDate:
                  type: string
                  format: date-time
                toDate:
                  type: string
                  format: date-time
                format:
                  type: string
                  enum: [json, csv, pdf]
                  default: json
            example:
              entityId: clxcamp001
              fromDate: "2024-01-01T00:00:00Z"
              toDate: "2024-03-31T23:59:59Z"
              format: csv
      responses:
        "200":
          description: Report generated
          content:
            application/json:
              example:
                success: true
                data:
                  reportId: clxrpt001
                  status: COMPLETED
                  downloadUrl: https://storage.aidlink.org/reports/rpt001.csv
        "400":
          $ref: '#/components/responses/ValidationError'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "429":
          $ref: '#/components/responses/RateLimited'

  # ==========================================================================
  # SEARCH
  # ==========================================================================

  /api/v1/search/campaigns:
    get:
      tags: [Search]
      summary: Search campaigns
      description: |
        Full-text and filtered search on campaigns.
        **Auth:** Bearer JWT — all roles.
        **Rate limit:** 30 req / min per user.
      operationId: searchCampaigns
      security:
        - bearerAuth: []
      parameters:
        - name: q
          in: query
          description: Full-text search query
          schema:
            type: string
          example: clean water kenya
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/CampaignStatus'
        - name: organizationId
          in: query
          schema:
            type: string
        - name: minTarget
          in: query
          schema:
            type: number
        - name: maxTarget
          in: query
          schema:
            type: number
        - name: fromDate
          in: query
          schema:
            type: string
            format: date-time
        - name: toDate
          in: query
          schema:
            type: string
            format: date-time
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        "200":
          description: Search results
          content:
            application/json:
              example:
                success: true
                data:
                  results:
                    - id: clxcamp001
                      title: Clean Water for Northern Kenya
                      status: ACTIVE
                      targetAmount: "50000.00"
                      currentAmount: "12500.00"
