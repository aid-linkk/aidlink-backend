  # DISTRIBUTIONS
  # ==========================================================================

  /api/v1/distributions:
    post:
      tags: [Distributions]
      summary: Create a distribution
      description: |
        Initiates disbursement of funds from a campaign to a beneficiary.
        **Auth:** Bearer JWT — role: ORGANIZATION or ADMIN.
        **Rate limit:** 5 req / min per user.
      operationId: createDistribution
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaignId, beneficiaryId, amount, method]
              properties:
                campaignId:
                  type: string
                  example: clxcamp001
                beneficiaryId:
                  type: string
                  example: clxben001
                amount:
                  type: number
                  format: float
                  minimum: 0.01
                  example: 500
                currency:
                  type: string
                  default: XLM
                  example: XLM
                method:
                  $ref: '#/components/schemas/DistributionMethod'
                notes:
                  type: string
                  example: Monthly water fund disbursement
            example:
              campaignId: clxcamp001
              beneficiaryId: clxben001
              amount: 500
              currency: XLM
              method: CRYPTO
              notes: Monthly water fund disbursement
      responses:
        "201":
          description: Distribution created
          content:
            application/json:
              example:
                success: true
                data:
                  id: clxdist001
                  campaignId: clxcamp001
                  beneficiaryId: clxben001
                  amount: "500.00"
                  currency: XLM
                  method: CRYPTO
                  status: PENDING
